<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
</head>

<body style="margin:0; padding:0; font-family: Arial, sans-serif; background:#f4f6f8;">

  <table width="100%" cellpadding="0" cellspacing="0">
    <tr>
      <td align="center">

        <!-- MAIN CONTAINER -->
        <table width="420" cellpadding="0" cellspacing="0"
          style="background:#ffffff; margin-top:15px; border-left:10px solid #f2c200; border-right:10px solid #f2c200; border-radius:8px; overflow:hidden;">

          <!-- LOGO + BRAND -->
          <tr>
            <td style="padding:15px; text-align:center;">
              <table align="center">
                <tr>
                  <td style="vertical-align:middle;">
                    <img src="https://i.imgur.com/eETtHsA.png" width="50">
                  </td>
                  <td style="vertical-align:middle; padding-left:10px;">
                    <span style="font-size:20px; font-weight:bold; color:#1f3c88;">
                      NAKITDEFTER
                    </span>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- HEADER -->
          <tr>
            <td style="background:#f2f2f2; padding:12px; font-size:16px; font-weight:bold; text-align:center;">
              Tek Kullanımlık Şifre (OTP)
            </td>
          </tr>

          <!-- BODY -->
          <tr>
            <td style="padding:18px; color:#333; font-size:14px; line-height:1.5; text-align:center;">

              <p style="margin:0 0 10px;">Merhaba,</p>

              <p style="margin:0 0 15px;">
                Giriş yapmak için doğrulama kodunuz:
               
              </p>

              <!-- OTP BOX -->
              <div style="margin:20px 0;">
                <span style="
                  display:inline-block;
                  padding:10px 20px;
                  font-size:26px;
                  letter-spacing:4px;
                  color:#1f3c88;
                  border:2px dashed #ccc;
                  border-radius:6px;
                  font-weight:bold;
                ">
                  {{otp}}
                </span>
              </div>

              <p style="margin:0 0 10px; font-size:13px;">
                Bu kod 5 dakika geçerlidir.
              </p>

              <p style="margin:0; font-size:12px; color:#777;">
                Bu işlemi siz yapmadıysanız, dikkate almayın.
              </p>

            </td>
          </tr>

        </table>

      </td>
    </tr>
  </table>

</body>
</html>
